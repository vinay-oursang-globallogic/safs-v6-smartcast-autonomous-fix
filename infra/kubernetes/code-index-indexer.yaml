apiVersion: batch/v1
kind: CronJob
metadata:
  name: code-index-indexer
  namespace: safs
  labels:
    app: code-index-indexer
spec:
  # Re-index all repos nightly at 02:00 UTC
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: code-index-indexer
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
          containers:
            - name: indexer
              image: ghcr.io/buddytv/code-index-mcp:latest
              imagePullPolicy: Always
              command: ["python", "-m", "code_index.cli", "index", "--all-repos"]
              resources:
                requests:
                  cpu: "1000m"
                  memory: "4Gi"
                limits:
                  cpu: "4000m"
                  memory: "16Gi"
              env:
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: safs-secrets
                      key: github-token
                - name: INDEX_ROOT
                  value: /data/index
                - name: GITHUB_ORG
                  value: buddytv
              volumeMounts:
                - name: code-index
                  mountPath: /data/index
          volumes:
            - name: code-index
              persistentVolumeClaim:
                claimName: code-index-pvc
