apiVersion: v1
kind: Service
metadata:
  name: safs
  namespace: safs
  labels:
    app: safs
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  selector:
    app: safs
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: safs
  namespace: safs
  labels:
    app: safs
