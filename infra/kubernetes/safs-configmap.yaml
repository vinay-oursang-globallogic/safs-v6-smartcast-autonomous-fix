apiVersion: v1
kind: Namespace
metadata:
  name: safs
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: safs-config
  namespace: safs
data:
  # Anthropic
  ANTHROPIC_BASE_URL: "https://api.anthropic.com"
  SAFS_FIX_GENERATOR_MODEL: "claude-opus-4"
  SAFS_ROOT_CAUSE_MODEL: "claude-haiku"
  SAFS_BUG_LAYER_ROUTER_MODEL: "claude-haiku"
  SAFS_TEST_GENERATOR_MODEL: "claude-sonnet"

  # Jira
  JIRA_URL: "https://jira.vizio.com"
  JIRA_USERNAME: "safs-bot@vizio.com"
  JIRA_PROJECT_KEY: "SMARTCAST"

  # Qdrant
  QDRANT_HOST: "qdrant"
  QDRANT_PORT: "6333"
  QDRANT_HTTPS: "false"
  QDRANT_COLLECTION_HISTORICAL_FIXES: "historical_fixes"
  QDRANT_COLLECTION_FIX_CORRECTIONS: "fix_corrections"

  # Voyage AI
  VOYAGE_MODEL: "voyage-code-3"

  # GitHub
  GITHUB_ORG: "buddytv"

  # PostgreSQL
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "safs"
  POSTGRES_USER: "safs"

  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # Temporal.io
  TEMPORAL_HOST: "temporal"
  TEMPORAL_PORT: "7233"
  TEMPORAL_NAMESPACE: "safs"
  TEMPORAL_TASK_QUEUE: "safs-pipeline"

  # Code Index MCP
  CODE_INDEX_MCP_URL: "http://code-index-mcp:8081"
